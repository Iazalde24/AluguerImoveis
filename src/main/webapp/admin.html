<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Imobiliária de Pemba</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="admin.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.28.0/feather.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="admin-nav">
        <div class="nav-container">
            <h1>Admin Dashboard</h1>
            <div class="admin-profile">
                <img src="avatar.png" alt="Admin" class="admin-avatar">
                <button id="logoutBtn" class="btn btn-danger" onclick="window.location.href='/';">Sair</button>

            </div>
        </div>
    </nav>

    <main class="admin-main">
        <section class="overview-section">
            <h2>Visão Geral</h2>
            <div class="stats-grid">
                <div class="stats-card">
                    <h3>Total de Imóveis</h3>
                    <p id="totalProperties">15</p>
                </div>
                <div class="stats-card">
                    <h3>Usuários Ativos</h3>
                    <p id="activeUsers">245</p>
                </div>
                <div class="stats-card">
                    <h3>Imóveis Disponíveis</h3>
                    <p id="availableProperties">8</p>
                </div>
                <div class="stats-card">
                    <h3>Lucro Mensal (MZN)</h3>
                    <p id="monthlyRevenue">150,000</p>
                </div>
            </div>
        </section>

        <section class="charts-section">
            <h2>Estatísticas</h2>
            <div class="charts-grid">
                <canvas id="propertyChart" width="400" height="200"></canvas>
               
            </div>
        </section>

        
    </main>

    <script src="admin.js"></script>
</body>
</html>
